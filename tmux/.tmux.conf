# general options
set -g mouse on
set -g escape-time 10
set -g base-index 1
setw -g mode-keys vi
setw -g renumber-windows on
set-option -g detach-on-destroy off
set-option -g focus-events on
set-option -sa terminal-features ',screen-256color:RGB'

# basic navigation
bind-key | split-window -h -c "#{pane_current_path}"
bind-key _ split-window -v -c "#{pane_current_path}"

# essentials
bind r source-file ~/.config/tmux/.tmux.conf; display-message "tmux configuration reloaded"
bind X command-prompt -p "Are you sure you want to kill the server? this action will wipe all sessions (y/n)" "switch-client -n %1 ; if '[ %1 = y ]' 'kill-server'"
bind-key -Tr C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# copy-mode vi style
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind P paste-buffer
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# synchronize keystorkes on all panes (multi-cursor)
bind S setw synchronize-panes

# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'niksingh710/minimal-tmux-status'

# vim-tmux-yabai navigation (replaces vim-tmux-navigator with yabai fallback)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" "send-keys C-h" "if-shell '[ #{pane_at_left} -eq 1 ]' 'run-shell \"~/.config/skhd/yabai_focus.sh west\"' 'select-pane -L'"
bind-key -n C-j if-shell "$is_vim" "send-keys C-j" "if-shell '[ #{pane_at_bottom} -eq 1 ]' 'run-shell \"~/.config/skhd/yabai_focus.sh south\"' 'select-pane -D'"
bind-key -n C-k if-shell "$is_vim" "send-keys C-k" "if-shell '[ #{pane_at_top} -eq 1 ]' 'run-shell \"~/.config/skhd/yabai_focus.sh north\"' 'select-pane -U'"
bind-key -n C-l if-shell "$is_vim" "send-keys C-l" "if-shell '[ #{pane_at_right} -eq 1 ]' 'run-shell \"~/.config/skhd/yabai_focus.sh east\"' 'select-pane -R'"

# powerline
bind-key b set-option status
set -g @minimal-tmux-bg "#fb4934"
set -g @minimal-tmux-justify "centre"
set -g @minimal-tmux-indicator false
set -g @minimal-tmux-status "bottom"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'
